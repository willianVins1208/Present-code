$kind: http-request
url: "{{baseUrl}}/api/items"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test("items status is 200", function () {
        pm.response.to.have.status(200);
      });
      pm.test("response is an array", function () {
        var itemList = pm.response.json();
        pm.expect(itemList).to.be.an("array");
        var matchedItem = itemList.find(function (entry) {
          return String(entry.id) === String(pm.collectionVariables.get("itemId"));
        });
        pm.expect(String(matchedItem.inventory.quantity)).to.eql(String(pm.collectionVariables.get("inventoryQuantity")));
      });
    language: text/javascript
order: 9000
