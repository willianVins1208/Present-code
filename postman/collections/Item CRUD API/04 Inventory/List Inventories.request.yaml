$kind: http-request
url: "{{baseUrl}}/api/inventories"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test("inventories status is 200", function () {
        pm.response.to.have.status(200);
      });
      pm.test("inventory list contains created record", function () {
        var inventories = pm.response.json();
        pm.expect(
          inventories.some(function (entry) {
            return String(entry.id) === String(pm.collectionVariables.get("inventoryId"));
          })
        ).to.eql(true);
      });
    language: text/javascript
order: 8500
