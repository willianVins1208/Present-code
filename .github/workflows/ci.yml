name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Run Jest tests
        run: npm test

      - name: Start API server
        run: |
          node dist/src/server.js > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for API health check
        run: |
          for i in {1..30}; do
            if curl --silent --fail http://localhost:3000/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Server did not become ready in time."
          cat server.log
          exit 1

      - name: Run Postman regression suite
        run: npm run test:postman

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-log
          path: server.log

      - name: Stop API server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi
